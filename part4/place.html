<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <a href="index.html">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
        </a>

        <nav>
            <a href="index.html">Places</a>
            <a href="login.html" id="login-link" class="login-button">
                Login
            </a>
        </nav>
    </header>

    <main>

        <section id="place-details" class="place-details">
            <!-- Place details will be populated dynamically -->
        </section>

        <section id="reviews">
            <h2>Reviews</h2>

            <div id="reviews-list">
                <!-- Reviews will be populated dynamically -->
            </div>
        </section>

        <section id="add-review" class="add-review">
            <h2>Add a Review</h2>

            <a
                href="add_review.html"
                id="add-review-link"
                class="details-button"
            >
                Add Review
            </a>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
